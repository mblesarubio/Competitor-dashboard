<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Points · Competitor Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1A1926;--bg2:#13111E;--card:#222130;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#FFFFFF;--body:#D3D3D3;--muted:#9997A8;
  --purple:#5D2EE6;--magenta:#783291;--orange:#FF9B63;
  --green:#22C55E;--red:#EF4444;
  --grad:linear-gradient(90deg,#5D2EE6 0%,#783291 50%,#FF9B63 100%);
  --r:10px;--r-lg:14px;--r-xl:18px;
}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;-webkit-font-smoothing:antialiased}
nav{position:sticky;top:0;z-index:300;background:rgba(19,17,30,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem}
.nav-left{display:flex;align-items:center;gap:16px}
.rp-logo{display:flex;align-items:center;text-decoration:none}
.nav-sep{width:1px;height:18px;background:var(--border2);margin:0 16px}
.nav-module{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-pill{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 12px;border-radius:20px;background:rgba(93,46,230,0.2);border:1px solid rgba(93,46,230,0.4);color:#a78bfa}
.month-filter{display:flex;align-items:center;gap:6px}
.month-filter label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-right:4px}
.month-btns{display:flex;gap:6px}
.mf-btn{font-size:11px;font-weight:600;padding:5px 13px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;letter-spacing:.02em;transition:all .15s}
.mf-btn:hover{border-color:rgba(93,46,230,.5);color:var(--text)}
.mf-btn.active{background:var(--grad);border-color:transparent;color:#fff}
.page-tabs{position:sticky;top:58px;z-index:200;background:rgba(19,17,30,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex}
.ptab{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:16px 20px;border:none;background:none;color:var(--muted);cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.ptab.active{color:var(--text);border-bottom-color:var(--orange)}
.ptab:hover:not(.active){color:var(--body)}
.page{display:none;padding:2rem;max-width:1400px;margin:0 auto}
.page.active{display:block}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.mc{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.4rem 1.5rem;position:relative;overflow:hidden;transition:border-color .2s}
.mc:hover{border-color:rgba(93,46,230,.4)}
.mc.accent{border-color:rgba(93,46,230,.35)}
.mc.accent::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--grad)}
.mc .ml{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:10px}
.mc .mv{font-size:32px;font-weight:700;letter-spacing:-1.5px;color:var(--text);line-height:1}
.mc.accent .mv{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:20px;letter-spacing:-.3px;padding-top:5px}
.mc .ms{font-size:11px;color:var(--muted);margin-top:6px}
.ov-grid{display:grid;grid-template-columns:320px 1fr;gap:14px;margin-bottom:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-xl);padding:1.5rem}
.card-hd{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:1.2rem}
.cl-item{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:8px;cursor:pointer;transition:background .12s;margin:0 -8px}
.cl-item:hover{background:rgba(255,255,255,.05)}
.cl-item.active{background:rgba(93,46,230,.15)}
.cl-item.active .cl-name{color:#a78bfa;font-weight:600}
.cl-av{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;letter-spacing:.03em}
.cl-name{font-size:12px;font-weight:500;flex:1;color:var(--body)}
.cl-bar-bg{width:64px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;flex-shrink:0}
.cl-bar{height:100%;border-radius:2px;background:var(--grad)}
.cl-n{font-size:11px;font-weight:700;color:var(--muted);min-width:22px;text-align:right}
.chart-wrap{position:relative;height:230px}
.mb-table{width:100%;border-collapse:collapse;font-size:12px}
.mb-table th{text-align:left;padding:9px 12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);border-bottom:1px solid var(--border)}
.mb-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--body)}
.mb-table tr:last-child td{border-bottom:none}
.mb-table tr:hover td{background:rgba(255,255,255,.03)}
.mb-chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(255,255,255,.06);color:var(--muted)}
.mb-chip.hi{background:rgba(93,46,230,.25);color:#a78bfa}
.sub-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.4rem}
.stab{font-size:11px;font-weight:600;padding:7px 16px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;letter-spacing:.02em;transition:all .15s}
.stab:hover{border-color:rgba(93,46,230,.5);color:var(--text)}
.stab.active{background:var(--grad);border-color:transparent;color:#fff}
.det-header{border-radius:var(--r-xl);padding:2rem;margin-bottom:14px;position:relative;overflow:hidden;background:var(--card);border:1px solid var(--border)}
.det-header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad)}
.det-header-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
.det-name{font-size:28px;font-weight:700;color:#fff;letter-spacing:-.8px;margin-bottom:4px}
.det-sub{font-size:11px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
.det-badge{background:rgba(93,46,230,.25);border:1px solid rgba(93,46,230,.4);color:#a78bfa;font-size:11px;font-weight:700;padding:7px 16px;border-radius:20px;white-space:nowrap;letter-spacing:.03em}
.det-stats{display:flex;gap:2.5rem;margin-top:1.2rem}
.det-stat .ds-val{font-size:24px;font-weight:700;letter-spacing:-.8px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.det-stat .ds-lbl{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.07em}
.ins-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.ins-block{border-radius:var(--r-lg);padding:1.2rem;background:rgba(255,255,255,.03);border:1px solid var(--border)}
.ins-block.str{border-color:rgba(34,197,94,.2);background:rgba(34,197,94,.05)}
.ins-block.wk{border-color:rgba(239,68,68,.2);background:rgba(239,68,68,.05)}
.ins-block.diff{border-color:rgba(93,46,230,.25);background:rgba(93,46,230,.08)}
.ins-hd{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ins-block.str .ins-hd{color:var(--green)}
.ins-block.wk .ins-hd{color:var(--red)}
.ins-block.diff .ins-hd{color:#a78bfa}
.ins-block ul{list-style:none}
.ins-block ul li{font-size:12px;line-height:1.6;padding:5px 0 5px 16px;position:relative;border-bottom:1px solid var(--border);color:var(--body)}
.ins-block ul li:last-child{border-bottom:none}
.ins-block.str ul li::before{content:'';position:absolute;left:0;top:13px;width:5px;height:5px;border-radius:50%;background:var(--green)}
.ins-block.wk ul li::before{content:'';position:absolute;left:0;top:13px;width:5px;height:5px;border-radius:50%;background:var(--red)}
.ins-block.diff ul li::before{content:'';position:absolute;left:0;top:13px;width:5px;height:5px;border-radius:50%;background:#a78bfa}
.empty-ins{font-size:12px;color:var(--muted);font-style:italic;padding:4px 0}
.quotes-hd{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:12px}
.quote-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-left:3px solid var(--purple);border-radius:0 10px 10px 0;padding:12px 16px;margin-bottom:8px}
.qt{font-size:12.5px;line-height:1.65;color:var(--body);font-style:italic;margin-bottom:6px}
.qm{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.03em}
.no-quotes{font-size:12px;color:var(--muted);font-style:italic}
.p-item{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:8px}
.p-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px}
.p-name{font-size:13px;font-weight:600;color:var(--text)}
.p-badge{font-size:10px;font-weight:700;letter-spacing:.05em;padding:4px 12px;border-radius:20px;white-space:nowrap;background:rgba(255,155,99,.2);color:var(--orange);border:1px solid rgba(255,155,99,.3)}
.p-quote{font-size:12px;color:var(--muted);font-style:italic;line-height:1.55;margin-bottom:4px}
.p-source{font-size:11px;color:rgba(255,255,255,.25);font-weight:500}
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.4rem}
.cattab{font-size:10px;font-weight:700;padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;letter-spacing:.07em;text-transform:uppercase;transition:all .15s}
.cattab:hover{border-color:rgba(93,46,230,.5);color:var(--text)}
.cattab.active{background:var(--grad);border-color:transparent;color:#fff}
.sep{height:1px;background:var(--border);margin:1.25rem 0}
.av0{background:rgba(93,46,230,.25);color:#a78bfa}.av1{background:rgba(14,165,233,.2);color:#7dd3fc}
.av2{background:rgba(245,158,11,.2);color:#fcd34d}.av3{background:rgba(236,72,153,.2);color:#f9a8d4}
.av4{background:rgba(16,185,129,.2);color:#6ee7b7}.av5{background:rgba(239,68,68,.2);color:#fca5a5}
.av6{background:rgba(107,114,128,.2);color:#d1d5db}.av7{background:rgba(139,92,246,.2);color:#c4b5fd}
.fade{animation:fi .2s ease both}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:1000px){.ov-grid{grid-template-columns:1fr}.ins-grid{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.metrics{grid-template-columns:1fr 1fr}.ins-grid{grid-template-columns:1fr}.page{padding:1rem}}
</style>
</head>

var CATS=[
  {key:"coverage",label:"Coverage"},{key:"service_offering",label:"Service Offering"},
  {key:"detection",label:"Detection"},{key:"enforcement",label:"Enforcement"},
  {key:"scale",label:"Scalability"},{key:"accuracy",label:"Accuracy"},
  {key:"service_level",label:"Service Level"},{key:"validation_prioritization",label:"Validation & Prioritization"},
  {key:"pricing",label:"Pricing"},{key:"product_features",label:"Product Features"}
];
var LINE_COLORS=["#8B5CF6","#38BDF8","#FB923C","#EC4899","#34D399","#F87171","#A78BFA","#60A5FA"];
var AV=["av0","av1","av2","av3","av4","av5","av6","av7"];
var activeMonth=null,currentComp=null,currentCat=null,trendChart=null;

function mKeys(){return Object.keys(DATA.months).sort();}
function monthData(mk){return DATA.months[mk];}
function compInMonth(mk,name){var m=DATA.months[mk];return m?m.competitors.find(function(c){return c.name===name;}):null;}
function allCompNames(){return monthData(mKeys()[mKeys().length-1]).competitors.map(function(c){return c.name;});}
function activeData(){return monthData(activeMonth);}
function countQuotes(comp){var n=0;CATS.forEach(function(c){var d=comp.categories[c.key];n+=(d?d.quotes||[]:[] ).length;});return n;}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function init(){
  var keys=mKeys();
  activeMonth=keys[keys.length-1];
  currentComp=allCompNames()[0];
  currentCat=CATS[0].key;
  var mfDiv=document.getElementById("month-btns");
  keys.forEach(function(mk){
    var b=document.createElement("button");
    b.className="mf-btn"+(mk===activeMonth?" active":"");
    b.textContent=monthData(mk).label;
    (function(month,btn){btn.onclick=function(){activeMonth=month;renderAll(btn);};})(mk,b);
    mfDiv.appendChild(b);
  });
  renderAll(null);
}

function renderAll(clickedBtn){
  if(clickedBtn){document.querySelectorAll(".mf-btn").forEach(function(b){b.classList.remove("active");});clickedBtn.classList.add("active");}
  var lm=activeData();
  document.getElementById("nav-calls").textContent=lm.total_calls+" calls";
  renderMetrics();renderCompList();renderTrend();renderMonthlyTable();
  if(document.getElementById("page-competitor").classList.contains("active"))renderCompSelector();
  if(document.getElementById("page-category").classList.contains("active"))renderCatSelector();
}

function renderMetrics(){
  var lm=activeData();
  var total=lm.competitors.reduce(function(s,c){return s+c.mention_count;},0);
  var top=lm.competitors.slice().sort(function(a,b){return b.mention_count-a.mention_count;})[0];
  var qTotal=lm.competitors.reduce(function(s,c){return s+countQuotes(c);},0);
  document.getElementById("metrics").innerHTML=
    '<div class="mc"><div class="ml">Total Mentions</div><div class="mv">'+total+'</div><div class="ms">'+lm.total_calls+' calls analysed</div></div>'+
    '<div class="mc accent"><div class="ml">Top Competitor</div><div class="mv">'+esc(top.name)+'</div><div class="ms">'+top.mention_count+' mentions this period</div></div>'+
    '<div class="mc"><div class="ml">Competitors Tracked</div><div class="mv">'+lm.competitors.length+'</div><div class="ms">across '+mKeys().length+' months</div></div>'+
    '<div class="mc"><div class="ml">Quotes Captured</div><div class="mv">'+qTotal+'</div><div class="ms">verbatim from transcripts</div></div>';
}

function renderCompList(){
  var lm=activeData();
  var sorted=lm.competitors.slice().sort(function(a,b){return b.mention_count-a.mention_count;});
  var max=sorted[0].mention_count;
  var html="";
  sorted.forEach(function(c,i){
    var active=c.name===currentComp?" active":"";
    var btn=document.createElement("div");
    btn.className="cl-item"+active;
    btn.innerHTML='<div class="cl-av '+AV[i%8]+'">'+esc(c.name.substring(0,2).toUpperCase())+'</div>'+
      '<span class="cl-name">'+esc(c.name)+'</span>'+
      '<div class="cl-bar-bg"><div class="cl-bar" style="width:'+Math.round(c.mention_count/max*100)+'%"></div></div>'+
      '<span class="cl-n">'+c.mention_count+'</span>';
    (function(name){btn.onclick=function(){goToComp(name);};})(c.name);
    html+=btn.outerHTML;
  });
  document.getElementById("comp-list").innerHTML=html;
  // rebind clicks since outerHTML loses handlers
  var items=document.getElementById("comp-list").querySelectorAll(".cl-item");
  sorted.forEach(function(c,i){(function(name){items[i].onclick=function(){goToComp(name);};})(c.name);});
}

function renderTrend(){
  var keys=mKeys();
  var comps=allCompNames();
  var datasets=comps.map(function(name,i){
    return {label:name,data:keys.map(function(mk){var c=compInMonth(mk,name);return c?c.mention_count:0;}),
      borderColor:LINE_COLORS[i%LINE_COLORS.length],backgroundColor:"transparent",
      tension:.4,pointRadius:4,pointBackgroundColor:LINE_COLORS[i%LINE_COLORS.length],borderWidth:2};
  });
  if(trendChart)trendChart.destroy();
  trendChart=new Chart(document.getElementById("trendChart"),{type:"line",
    data:{labels:keys.map(function(k){return monthData(k).label;}),datasets:datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:"bottom",labels:{boxWidth:8,font:{size:10,family:"Helvetica Neue"},color:"#9997A8",padding:12,usePointStyle:true}}},
      scales:{x:{grid:{color:"rgba(255,255,255,0.05)"},ticks:{color:"#9997A8",font:{size:10}}},
        y:{grid:{color:"rgba(255,255,255,0.05)"},ticks:{color:"#9997A8",font:{size:10}},beginAtZero:true}}}});
}

function renderMonthlyTable(){
  var keys=mKeys();
  var comps=allCompNames();
  var headHtml="<th>Competitor</th>";
  keys.forEach(function(k){headHtml+="<th>"+monthData(k).label+"</th>";});
  headHtml+="<th>Total</th>";
  document.getElementById("mb-head").innerHTML=headHtml;
  var bodyHtml="";
  comps.forEach(function(name,ci){
    var vals=keys.map(function(mk){var c=compInMonth(mk,name);return c?c.mention_count:0;});
    var total=vals.reduce(function(a,b){return a+b;},0);
    var maxV=Math.max.apply(null,vals);
    bodyHtml+="<tr><td><span class='cl-av "+AV[ci%8]+"' style='display:inline-flex;width:26px;height:26px;font-size:9px;border-radius:6px;margin-right:10px;vertical-align:middle'>"+esc(name.substring(0,2).toUpperCase())+"</span><strong style='color:var(--text)'>"+esc(name)+"</strong></td>";
    vals.forEach(function(v){bodyHtml+="<td><span class='mb-chip"+(v===maxV&&v>0?" hi":"")+"'>"+v+"</span></td>";});
    bodyHtml+="<td><strong style='color:var(--text)'>"+total+"</strong></td></tr>";
  });
  document.getElementById("mb-body").innerHTML=bodyHtml;
}

function renderCompSelector(){
  var comps=allCompNames();
  if(comps.indexOf(currentComp)===-1)currentComp=comps[0];
  var el=document.getElementById("comp-selector");
  el.innerHTML="";
  comps.forEach(function(name){
    var b=document.createElement("button");
    b.className="stab"+(name===currentComp?" active":"");
    b.textContent=name;
    (function(n){b.onclick=function(){selectComp(n);};})(name);
    el.appendChild(b);
  });
  renderCompDetail();
}

function selectComp(name){currentComp=name;renderCompSelector();}

function goToComp(name){
  currentComp=name;
  switchPage("competitor",document.querySelectorAll(".ptab")[1]);
}

  var trendVals=keys.map(function(mk){var c=compInMonth(mk,currentComp);return c?c.mention_count:0;});

    '<div class="det-stats">'+
    '<div class="det-stat"><div class="ds-val">'+comp.mention_count+'</div><div class="ds-lbl">Mentions this period</div></div>'+
    '<div class="det-stat"><div class="ds-val">'+trendVals.reduce(function(a,b){return a+b;},0)+'</div><div class="ds-lbl">All-time total</div></div>'+

    '<div class="ins-block wk"><div class="ins-hd">&#10007; Weaknesses</div>'+(wkAll.length?'<ul>'+wkAll.map(function(w){return '<li><span style="font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.3);display:block;margin-bottom:2px">'+esc(w.cat)+'</span>'+esc(w.text)+'</li>';}).join("")+'</ul>':'<div class="empty-ins">No weaknesses recorded.</div>')+'</div>'+
    '<div class="ins-block diff"><div class="ins-hd">&#9670; Key Differentiators</div>'+(strAll.length?'<ul>'+strAll.filter(function(_,i){return i<6;}).map(function(s){return '<li>'+esc(s.text)+'</li>';}).join("")+'</ul>':'<div class="empty-ins">No differentiators identified.</div>')+'</div>'+

  el.innerHTML="";
  CATS.forEach(function(c){
    var b=document.createElement("button");
    b.className="cattab"+(c.key===currentCat?" active":"");
    b.textContent=c.label;
    (function(k){b.onclick=function(){selectCat(k);};})(c.key);
    el.appendChild(b);
  });
  renderCatDetail();
}

function selectCat(key){currentCat=key;renderCatSelector();}

function renderCatDetail(){
  var lm=activeData();
  var wrap=document.createElement("div");
  wrap.className="fade";
  wrap.style.cssText="display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px";
  lm.competitors.forEach(function(comp,i){
    var d=comp.categories[currentCat];
    var str=d?d.strengths||[]:[];var wk=d?d.weaknesses||[]:[];var qs=d?d.quotes||[]:[];
    var card=document.createElement("div");
    card.className="card";
    var inner='<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">'+
      '<div class="cl-av '+AV[i%8]+'" style="width:36px;height:36px;flex-shrink:0;border-radius:9px;font-size:11px">'+esc(comp.name.substring(0,2).toUpperCase())+'</div>'+
      '<div><div style="font-size:14px;font-weight:700;color:var(--text)">'+esc(comp.name)+'</div>'+
      '<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:2px">'+comp.mention_count+' mentions</div></div></div>';
    if(str.length){inner+='<div style="margin-bottom:10px"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--green);margin-bottom:8px">Strengths</div><div class="ins-block str" style="padding:.85rem"><ul>'+str.map(function(s){return '<li>'+esc(s)+'</li>';}).join("")+'</ul></div></div>';}
    if(wk.length){inner+='<div style="margin-bottom:10px"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--red);margin-bottom:8px">Weaknesses</div><div class="ins-block wk" style="padding:.85rem"><ul>'+wk.map(function(w){return '<li>'+esc(w)+'</li>';}).join("")+'</ul></div></div>';}
    if(qs.length){inner+='<div class="sep" style="margin:.85rem 0"></div><div class="quotes-hd">Quotes</div>'+qs.map(function(q){return '<div class="quote-card"><div class="qt">&ldquo;'+esc(q.text)+'&rdquo;</div><div class="qm">'+esc(q.call)+' &middot; '+esc(q.date)+(q.amount?' &middot; <span style="color:var(--orange);font-weight:700">'+esc(q.amount)+'</span>':'')+'</div></div>';}).join("");}
    if(!str.length&&!wk.length&&!qs.length){inner+='<div class="empty-ins" style="padding:.5rem 0">No data for this category yet.</div>';}
    card.innerHTML=inner;
    wrap.appendChild(card);
  });
  document.getElementById("cat-detail").innerHTML="";
  document.getElementById("cat-detail").appendChild(wrap);
}

function switchPage(id,btn){
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
  document.querySelectorAll(".ptab").forEach(function(b){b.classList.remove("active");});
  document.getElementById("page-"+id).classList.add("active");
  btn.classList.add("active");
  if(id==="competitor")renderCompSelector();
  if(id==="category")renderCatSelector();
}

init();

</script>
</body>
</html>
